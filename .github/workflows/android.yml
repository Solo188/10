name: Android CI

on:
push:
branches: [ "main", "master" ]
pull_request:
branches: [ "main", "master" ]

jobs:

build-debug:
name: Test & Build (debug)
runs-on: ubuntu-latest

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Set up JDK 17
    uses: actions/setup-java@v4
    with:
      java-version: '17'
      distribution: 'temurin'
      cache: gradle

  - name: Grant execute permission for gradlew
    run: chmod +x gradlew

  - name: Cache Gradle
    uses: actions/cache@v4
    with:
      path: |
        ~/.gradle/caches
        ~/.gradle/wrapper
      key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
      restore-keys: |
        ${{ runner.os }}-gradle-

  - name: Run unit tests
    run: ./gradlew testDebugUnitTest --stacktrace

  - name: Upload test report
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: test-report
      path: app/build/reports/tests/testDebugUnitTest/
      retention-days: 14

  - name: Build debug APK
    run: ./gradlew assembleDebug --stacktrace

  - name: Upload debug APK
    uses: actions/upload-artifact@v4
    with:
      name: app-debug
      path: app/build/outputs/apk/debug/app-debug.apk
      retention-days: 14

build-release:
name: Build (release)
runs-on: ubuntu-latest
needs: build-debug
if: github.event_name == 'push'

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Set up JDK 17
    uses: actions/setup-java@v4
    with:
      java-version: '17'
      distribution: 'temurin'
      cache: gradle

  - name: Grant execute permission for gradlew
    run: chmod +x gradlew

  - name: Cache Gradle
    uses: actions/cache@v4
    with:
      path: |
        ~/.gradle/caches
        ~/.gradle/wrapper
      key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
      restore-keys: |
        ${{ runner.os }}-gradle-

  - name: Decode keystore if exists
    run: |
      if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/release.jks
      fi

  - name: Build release APK (auto signed if secrets exist)
    run: |
      if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.jks \
          -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
          -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
          -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
          --stacktrace
      else
        ./gradlew assembleRelease --stacktrace
      fi

  - name: Upload release APK
    uses: actions/upload-artifact@v4
    with:
      name: app-release
      path: app/build/outputs/apk/release/app-release*.apk
      retention-days: 30
